<!DOCTYPE html>
<html>
<head>
    <title>Partnership</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #111;
            padding: 40px 25px;
            border-radius: 12px;
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #e63946;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .msg {
            background: green;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Partnership Application</h2>

    <!-- ✅ SUCCESS MESSAGE -->
    {% if messages %}
        {% for message in messages %}
            <div class="msg">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- ✅ FORM -->
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="company_name" placeholder="Company Name" required>

        <input type="text" name="contact_person" placeholder="Contact Person" required>

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <select name="partnership_type" required>
            <option value="">Select Partnership Type</option>
            <option value="Sponsorship">Sponsorship</option>
            <option value="Collaboration">Collaboration</option>
            <option value="Vendor">Vendor</option>
        </select>

        <textarea name="message" placeholder="Message" rows="4" required></textarea>

        <button type="submit">SUBMIT</button>
    </form>

</div>

</body>
</html>
