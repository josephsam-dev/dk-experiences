<!DOCTYPE html>
<html>
<head>
    <title>Buy Ticket</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px; /* 🔥 space for mobile */
        }

        .card {
            background: #111;
            padding: 50px 25px;   /* 🔥 taller card */
            border-radius: 15px;
            width: 320px;         /* 📱 phone width */
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        h2 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 25px;  /* 🔥 more space */
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 16px;        /* 🔥 bigger inputs */
            margin-top: 20px;     /* 🔥 vertical spacing */
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;     /* 🔥 pushes button down */
            background: orange;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        /* 🔥 MOBILE RESPONSIVE BOOST */
        @media (max-width: 480px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>{{ ticket.category }}</h2>
    <p>Price: ₦{{ ticket.price }}</p>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <button type="submit">Proceed to Payment</button>
    </form>
</div>

</body>
</html>
