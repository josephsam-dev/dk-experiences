<!DOCTYPE html>
<html>
<head>
    <title>Buy Ticket</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #111;
            padding: 30px 20px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }

        h2 {
            margin-bottom: 15px;
        }

        .ticket-item {
            margin: 15px 0;
        }

        .ticket-item button {
            padding: 5px 10px;
            margin: 5px;
        }

        .qty {
            margin: 0 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: orange;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        #totalAmount {
            font-weight: bold;
            color: orange;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Select Tickets</h2>

    <!-- 🎟️ TICKETS -->
    <!-- 🎟️ TICKETS -->

<div class="ticket-item" data-type="Early Bird" data-price="2500">
    <p>Early Bird - ₦2,500</p>
    <button type="button" onclick="changeQty(this, -1)">-</button>
    <span class="qty">0</span>
    <button type="button" onclick="changeQty(this, 1)">+</button>
</div>

<div class="ticket-item" data-type="VIP" data-price="7000">
    <p>VIP - ₦7,000</p>
    <button type="button" onclick="changeQty(this, -1)">-</button>
    <span class="qty">0</span>
    <button type="button" onclick="changeQty(this, 1)">+</button>
</div>

<div class="ticket-item" data-type="VVIP" data-price="17000">
    <p>VVIP - ₦17,000</p>
    <button type="button" onclick="changeQty(this, -1)">-</button>
    <span class="qty">0</span>
    <button type="button" onclick="changeQty(this, 1)">+</button>
</div>
    <!-- 💰 TOTAL -->
    <p>Total: <span id="totalAmount">NGN 0</span></p>

    <!-- 🧾 FORM -->
    <form method="POST" action="{% url 'create_ticket' %}">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="phone" placeholder="Phone Number" required>

        <input type="hidden" name="tickets" id="tickets_input">
        <input type="hidden" name="total" id="total_input">

        <button type="submit" onclick="prepareTicketData()">Proceed to Payment</button>
    </form>

</div>

<script>
let total = 0;

function changeQty(button, change) {
    let item = button.parentElement;
    let qtyEl = item.querySelector(".qty");
    let price = parseInt(item.dataset.price);

    let qty = parseInt(qtyEl.innerText);
    qty += change;

    if (qty < 0) qty = 0;

    total += change * price;
    if (total < 0) total = 0;

    qtyEl.innerText = qty;
    updateTotal();
}

function updateTotal() {
    document.getElementById("totalAmount").innerText = "NGN " + total;
}

function prepareTicketData() {
    let tickets = [];

    document.querySelectorAll(".ticket-item").forEach(item => {
        let qty = parseInt(item.querySelector(".qty").innerText);

        if (qty > 0) {
            tickets.push({
                type: item.dataset.type,
                quantity: qty,
                price: item.dataset.price
            });
        }
    });

    document.getElementById("tickets_input").value = JSON.stringify(tickets);
    document.getElementById("total_input").value = total;
}
</script>

</body>
</html>
