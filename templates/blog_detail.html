{% extends "base.html" %}
{% load static %}

{% block content %}

<div style="max-width:900px; margin:50px auto;">

    <h1>{{ post.title }}</h1>

    <p style="color:gray;">
        Published on {{ post.created_at }}
    </p>


    <p style="line-height:1.8;">
        {{ post.content }}
    </p>

</div>

{% endblock %}
