<!DOCTYPE html>
<html>
<head>
    <title>Select Ticket</title>

    <style>
        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            background: #111;
            padding: 40px 25px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: orange;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>


<div class="box">
    <h2>{{ event.title }}</h2>

    <!-- ✅ FIXED FORM -->
    <form method="GET" action="/travel/buy-ticket/0/">

        <select name="ticket_id">
            {% for ticket in tickets %}
                <option value="{{ ticket.id }}">
                    {{ ticket.category }} -
                    {% if ticket.price == 0 %}
                        FREE
                    {% else %}
                        ₦{{ ticket.price }}
                    {% endif %}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Proceed</button>

    </form>
</div>

</body>
</html>
