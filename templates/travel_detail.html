{% extends "base.html" %}
{% load humanize %}

{% block content %}

<div class="max-w-4xl mx-auto py-16 px-4">

<img src="{{ package.image.url }}" class="rounded-xl mb-6 w-full h-96 object-cover">

<h1 class="text-3xl font-bold mb-4">
{{ package.title }}
</h1>

<p class="text-gray-600 mb-4">
{{ package.description }}
</p>

<p class="text-gray-500">
📍 {{ package.location }}
</p>

<p class="text-gray-500 mb-4">
⏳ {{ package.duration }}
</p>

<p class="text-2xl font-bold text-yellow-500 mb-6">
₦{{ package.price|intcomma }}
</p>

<a href="{% url 'book_travel' package.id %}" 
class="bg-black text-white px-6 py-3 rounded-lg inline-block">
Proceed To Booking
</a>

</div>

{% endblock %}
