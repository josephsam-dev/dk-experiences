<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DK Experiences & Dlite Travels</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-black text-white p-4 flex justify-between items-center relative">

    <h2 class="text-xl font-bold">DK Experiences</h2>

    <button id="menu-btn" class="text-2xl">☰</button>

    <ul id="menu" class="hidden flex-col absolute top-16 left-0 w-full bg-black text-center z-50">
        <li class="py-2"><a href="/" class="hover:text-yellow-400">Home</a></li>
        <li class="py-2"><a href="{% url 'events' %}" class="hover:text-yellow-400">Events</a></li>
        <li class="py-2"><a href="{% url 'travel' %}" class="hover:text-yellow-400">Travel</a></li>
        <li class="py-2"><a href="{% url 'blog' %}" class="hover:text-yellow-400">Blog</a></li>
        <li class="py-2"><a href="{% url 'partnership' %}" class="hover:text-yellow-400">Partnership</a></li>
        <li class="py-2"><a href="{% url 'contact' %}" class="hover:text-yellow-400">Contact</a></li>
    </ul>

</nav>

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<!-- FOOTER -->
<footer class="bg-gray-900 text-white text-center p-6">
    <p>© 2026 DK Experiences & Dlite Travels.ng</p>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/2348055828183"
target="_blank"
class="fixed bottom-6 right-6 bg-green-500 text-white px-5 py-3 rounded-full shadow-lg hover:bg-green-600 flex items-center gap-2 z-50">
Chat on WhatsApp
</a>

<!-- SCRIPT -->
<script>
    const btn = document.getElementById("menu-btn");
    const menu = document.getElementById("menu");

    function checkScreen() {
        if (window.innerWidth >= 768) {
            menu.classList.remove("hidden");
            menu.classList.add("flex", "flex-row", "space-x-6", "static");
        } else {
            menu.classList.add("hidden");
            menu.classList.remove("flex-row", "space-x-6", "static");
        }
    }

    btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
    });

    window.addEventListener("resize", checkScreen);
    window.addEventListener("load", checkScreen);
</script>

</body>
</html>
