{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto mt-16 p-6">

    <div class="bg-green-100 border border-green-400 rounded-2xl p-8 text-center shadow-lg">

        <h2 class="text-2xl font-bold text-green-700 mb-4">
            🎉 Booking Confirmed!
        </h2>

        <p class="text-gray-700 mb-4">
            Your ticket has been successfully booked.
        </p>

        <p class="text-sm text-gray-600">Reference</p>

        <h3 class="text-lg font-bold text-black mb-6">
            {{ ticket.reference }}
        </h3>

        {% if qr_image %}
            <div class="flex justify-center mb-6">
                <img src="data:image/png;base64,{{ qr_image }}"
                     class="w-40 border p-2 bg-white rounded-lg">
            </div>
        {% endif %}

        <p class="text-gray-600 text-sm mb-6">
            Show this QR code at the event entrance.
        </p>

        <a href="/events/"
           class="bg-black text-white px-6 py-3 rounded-lg inline-block">
           Back to Events
        </a>

    </div>

</div>

{% endblock %}
