{% extends "base.html" %}

{% block content %}

<section class="bg-black text-white py-20 min-h-screen">

<div class="max-w-2xl mx-auto px-6">

<h1 class="text-4xl font-bold mb-10 text-center">Buy Event Ticket</h1>

<form id="ticketForm" class="space-y-6 bg-[#0b0b0b] p-8 rounded-xl border border-gray-800">

{% csrf_token %}

<!-- NAME -->

<div>
<label class="block mb-2">Name</label>
<input type="text" name="name" required
class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">
</div>

<!-- EMAIL -->

<div>
<label class="block mb-2">Email</label>
<input type="email" name="email" required
class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">
</div>

<!-- PHONE -->

<div>
<label class="block mb-2">Phone</label>
<input type="text" name="phone" required
class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">
</div>

<!-- TICKET TYPE -->

<div>
<label class="block mb-2">Ticket Type</label>

<select name="category"
class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">

<option value="early">Early Bird - FREE</option>
<option value="regular">Regular - ₦2,500</option>
<option value="vip">VIP - ₦7,000</option>
<option value="vvip">VVIP - ₦17,000</option>

</select>
</div>

<!-- BUTTON -->

<button type="button"
onclick="payWithPaystack()"
class="w-full bg-orange-500 hover:bg-orange-600 py-3 rounded-lg font-semibold">
Proceed to Payment </button>

</form>

</div>

</section>

<!-- PAYSTACK -->

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

function payWithPaystack(){

let name = document.querySelector("input[name='name']").value;
let email = document.querySelector("input[name='email']").value;
let phone = document.querySelector("input[name='phone']").value;
let ticket = document.querySelector("select[name='category']").value;

let amount = 0;

// ✅ CORRECT PRICING
if(ticket == "early"){
    amount = 0;
}
else if(ticket == "regular"){
    amount = 2500;
}
else if(ticket == "vip"){
    amount = 7000;
}
else if(ticket == "vvip"){
    amount = 17000;
}

// 🚨 VALIDATION
if(!name || !email || !phone){
    alert("Please fill all fields");
    return;
}

// 💳 PAYSTACK
let handler = PaystackPop.setup({

    key: "{{ paystack_public_key }}",   // ✅ FIXED (WITH COMMA)

    email: email,
    amount: amount * 100,   // kobo
    currency: "NGN",

    callback: function(response){

        window.location.href =
        "/travel/verify-payment/?reference=" + response.reference +
        "&name=" + name +
        "&email=" + email +
        "&phone=" + phone +
        "&ticket=" + ticket;
    },

    onClose: function(){
        alert("Payment cancelled");
    }

});

handler.openIframe();

}

</script>

{% endblock %}
