{% extends "base.html" %}

{% block content %}

<section class="bg-black text-white py-20 min-h-screen">

<div class="max-w-2xl mx-auto px-6">

<h1 class="text-4xl font-bold mb-10 text-center">Buy Event Ticket</h1>

<form id="ticketForm" class="space-y-6 bg-[#0b0b0b] p-8 rounded-xl border border-gray-800">

{% csrf_token %}

<!-- NAME -->
<div>
<label class="block mb-2">Name</label>
<input type="text" name="name" required
class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">
</div>

<!-- EMAIL -->
<div>
<label class="block mb-2">Email</label>
<input type="email" name="email" required
class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">
</div>

<!-- PHONE -->
<div>
<label class="block mb-2">Phone</label>
<input type="text" name="phone" required
class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3">
</div>

<!-- TICKET TYPE -->
<div>
<p class="mb-4 text-lg">
    Amount: ₦{{ package.price }}
</p>
</div>

<!-- BUTTON -->
<button type="button"
onclick="payWithPaystack()"
class="w-full bg-orange-500 hover:bg-orange-600 py-3 rounded-lg font-semibold">
Proceed to Payment
</button>

</form>

</div>

</section>
<!-- PAYSTACK -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
function payWithPaystack() {
    alert("CLICK WORKING");

    let name = document.querySelector("input[type='text']").value;
    let email = document.querySelector("input[type='email']").value;
    let phone = document.querySelector("input[name='phone']").value;

    let amount = "{{ package.price }}";
    let ticketId = "{{ package.id }}";

    // VALIDATION
    if (!name || !email || !phone) {
        alert("Please fill all fields");
        return;
    }

    let handler = PaystackPop.setup({
        key: "{{ paystack_public_key }}",
        email: email,
        amount: amount * 100,
        currency: "NGN",

        callback: function(response){
            window.location.href =
                "/travel/verify-payment/?reference=" + response.reference +
                "&name=" + name +
                "&email=" + email +
                "&phone=" + phone +
                "&ticket_id=" + ticketId;
        },

        onClose: function(){
            alert("Payment cancelled");
        }
    });

    handler.openIframe();
}
</script>

{% endblock %}
